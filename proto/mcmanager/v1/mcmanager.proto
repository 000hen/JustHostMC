syntax = "proto3";

package mcmanager.v1;

option csharp_namespace = "McManager.Grpc";
option go_package = "github.com/000hen/justhostmc/engine/gen/mcmanager/v1;mcmanagerv1";

// -- Enums --------------------------------------------------------------------

// DEPRECATED: server types are now Lua provider scripts keyed by a string
// provider_id (see ProviderInfo). This enum is retained only to document the
// legacy integer values that the SQLite store migrates out of
// (1=vanilla, 2=paper, 3=spigot, 4=forge, 5=neoforge, 6=fabric).
enum ServerType {
  SERVER_TYPE_UNSPECIFIED = 0;
  VANILLA = 1;
  PAPER = 2;
  SPIGOT = 3;
  FORGE = 4;
  NEOFORGE = 5;
  FABRIC = 6;
}

enum ServerStatus {
  SERVER_STATUS_UNSPECIFIED = 0;
  STOPPED = 1;
  INSTALLING = 2;
  STARTING = 3;
  RUNNING = 4;
  STOPPING = 5;
  CRASHED = 6;
}

// -- Core domain --------------------------------------------------------------

message Server {
  string id = 1;
  string name = 2;
  string provider_id = 3; // id of the Lua provider script (e.g. "vanilla")
  string mc_version = 4;
  int32 memory_mb = 5;
  int32 port = 6;
  ServerStatus status = 7;
  int32 sort_order = 8;
  string custom_java_args = 9;
}

message CreateServerRequest {
  string name = 1;
  string provider_id = 2; // id of the Lua provider script
  string mc_version = 3;
  int32 memory_mb = 4;
  int32 port = 5; // 0 = auto-assign
  string custom_java_args = 6;
}

message UpdateServerRequest {
  string id = 1;
  string name = 2;
  string mc_version = 3;
  int32 port = 4; // 0 = auto-assign a free port
  int32 sort_order = 5;
  int32 memory_mb = 6;
  string custom_java_args = 7;
}

// -- i18n / message strategy --------------------------------------------------
// Dynamic, display-only messages travel as a localization KEY in the form
// "namespace.method.type" (e.g. "install.progress.downloading_server"); the
// frontend resolves the key against its .resw resources and formats with args.
// Programmatic outcomes (errors, actions) stay strongly typed as enum/struct.
message LocalizedMessage {
  string key = 1; // "namespace.method.type"
  map<string, string> args = 2; // values for placeholders in the localized string
}

// Errors are returned via gRPC status (see PROMPT 禮4.1), with ErrorDetail packed
// into the status details. ErrorCode is the programmatic discriminator; the
// frontend maps it to a localized string. metadata carries context.
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  PORT_IN_USE = 1;
  VERSION_NOT_FOUND = 2;
  JRE_DOWNLOAD_FAILED = 3;
  DOCKER_UNAVAILABLE = 4;
  INSTALL_FAILED = 5;
  BACKUP_FAILED = 6; // a backup snapshot or restore operation failed
  BACKUP_NOT_FOUND = 7; // the requested backup id does not exist
  SERVER_RUNNING = 8; // operation requires the server to be stopped first
  MOD_UNSUPPORTED = 9; // this server type has no plugins/mods folder (e.g. Vanilla)
}

message ErrorDetail {
  ErrorCode code = 1;
  map<string, string> metadata = 2;
}

// Streamed continuously during Create so the frontend can render a live install
// view: a current-step label, a progress bar, and a scrolling detail/log box.
message InstallProgress {
  LocalizedMessage step = 1; // current high-level step (localized by frontend); set when the step changes
  double fraction = 2; // 0..1 overall progress; < 0 means indeterminate (show a marquee bar)
  string log_line = 3; // raw stdout/stderr passthrough; append verbatim to detail box; NOT localized
}

// -- Small request/response wrappers ------------------------------------------

message ServerId {
  string id = 1;
}
message Empty {}
message ServerList {
  repeated Server servers = 1;
}

message VersionQuery {
  string provider_id = 1;
}
message VersionList {
  repeated string versions = 1;
}

// -- Providers & scripting (Lua) ----------------------------------------------

// PermissionKind enumerates the capabilities a provider or automation script may
// request. The user grants or denies each before the script is usable, and the
// engine enforces the grant server-side (the UI consent is advisory).
enum PermissionKind {
  PERMISSION_KIND_UNSPECIFIED = 0;
  PERMISSION_NETWORK = 1;        // download over http(s)
  PERMISSION_INSTALL = 2;        // run jars / external processes during install
  PERMISSION_FS_SERVER = 3;      // read/write inside the server directory
  PERMISSION_CONSOLE_READ = 4;   // read the live console/log stream
  PERMISSION_CONSOLE_WRITE = 5;  // send commands to the console
  PERMISSION_SERVER_CONTROL = 6; // start/stop/restart the server
  PERMISSION_SCHEDULE = 7;       // run actions on a timer
  PERMISSION_SERVER_QUERY = 8;   // list/query server metadata from scripts
  PERMISSION_PLAYER_MANAGE = 9;  // query/kick/ban players from scripts
}

message Permission {
  PermissionKind kind = 1;
  string reason = 2; // script-declared reason, shown in the consent dialog
}

// ProviderCapabilities lets services/UI drop server-type-specific logic; e.g.
// which mod folder a provider uses, if any.
message ProviderCapabilities {
  string mod_layout = 1; // "plugins" | "mods" | "none"
}

// ProviderInfo describes an installed provider script (built-in or user-imported).
message ProviderInfo {
  string id = 1;          // stable provider id, e.g. "vanilla"
  string name = 2;
  string website = 3;
  string description = 4;
  string version = 5;     // author-declared script version
  string author = 6;
  bool builtin = 7;       // shipped embedded vs user-imported
  repeated Permission permissions = 8;  // declared/requested permissions
  repeated PermissionKind granted = 9;  // currently-granted subset
  ProviderCapabilities capabilities = 10;
}

message ProviderList {
  repeated ProviderInfo providers = 1;
}

message ImportProviderRequest {
  string lua_source = 1;  // the script text
  bytes jar = 2;          // optional user-supplied jar bundled with the script
  string jar_filename = 3;
}

message ProviderRef {
  string id = 1;
}

// SetPermissionsRequest sets the granted subset for a provider or script id.
message SetPermissionsRequest {
  string id = 1;
  repeated PermissionKind granted = 2;
}

// ScriptInfo describes an installed automation/control script.
message ScriptInfo {
  string id = 1;
  string name = 2;
  string website = 3;
  string description = 4;
  string version = 5;
  string author = 6;
  bool enabled = 7;
  repeated Permission permissions = 8;
  repeated PermissionKind granted = 9;
}

message ScriptList {
  repeated ScriptInfo scripts = 1;
}

// ParserInfo describes an installed mod/plugin metadata parser script
// (built-in or user-imported).
message ParserInfo {
  string id = 1;
  string name = 2;
  string website = 3;
  string description = 4;
  string version = 5;
  string author = 6;
  bool builtin = 7;
  repeated Permission permissions = 8;  // declared/requested permissions
  repeated PermissionKind granted = 9;  // currently-granted subset
  repeated string formats = 10;         // descriptor formats it reads, e.g. "fabric.mod.json"
}

message ParserList {
  repeated ParserInfo parsers = 1;
}

message ImportParserRequest {
  string lua_source = 1;
}

message ImportScriptRequest {
  string lua_source = 1;
}

message SetScriptEnabledRequest {
  string id = 1;
  bool enabled = 2;
}

message ScriptLogLine {
  string script_id = 1;
  string line = 2;
  string timestamp = 3; // RFC3339 UTC
  string session_id = 4; // stable id for one application/engine run
  string session_started_at = 5; // RFC3339 UTC
  bool current_session = 6;
}

// -- Console: bidirectional stream --------------------------------------------

message ConsoleInput {
  string server_id = 1;
  string command = 2;
}
message ConsoleEvent {
  string server_id = 1;
  string line = 2;
  ServerStatus status = 3;
}

// -- Backups ------------------------------------------------------------------

message Backup {
  string id = 1;
  string server_id = 2;
  int64 size_bytes = 3;
  string created_at = 4;
}
message BackupList {
  repeated Backup backups = 1;
}
message CreateBackupRequest {
  string server_id = 1;
  bool safe_online = 2;
} // safe_online = pause saves, snapshot, resume
message RestoreBackupRequest {
  string server_id = 1;
  string backup_id = 2;
}

// -- Settings: log retention ---------------------------------------------------

// LogRetention configures how install/console/automation logs are kept (PROMPT 禮15).
message LogRetention {
  int32 keep_days = 1; // delete logs older than this many days (0 = no age limit)
  int64 max_total_bytes = 2; // cap on total log bytes; oldest purged first (0 = no size limit)
}

// PurgeResult reports what an immediate purge removed.
message PurgeResult {
  int32 removed_files = 1;
  int64 freed_bytes = 2;
}

// -- Settings: isolation backend (Docker vs on-machine) ------------------------

// BackendInfo describes the isolation backend so the UI can transparently show
// where servers run and offer the Docker opt-in (PROMPT 禮10.7).
message BackendInfo {
  string active_mode = 1; // "on-machine" or "docker" ??the backend in use now
  bool docker_available = 2; // whether a usable Docker engine was detected
  string docker_version = 3; // Docker server version when available
  bool use_docker = 4; // the user's persisted opt-in preference
}
message UseDocker {
  bool enabled = 1;
} // set the Docker opt-in preference

// -- Players: live roster, parsed from the console stream ----------------------

message PlayerInfo {
  string name = 1;
  string uuid = 2;
}
message PlayerList {
  string server_id = 1;
  repeated PlayerInfo players = 2;
}

message PlayerLookup {
  string server_id = 1;
  string name = 2;
  string uuid = 3;
}

message PlayerInventoryItem {
  int32 slot = 1;
  string slot_name = 2;
  string item_id = 3;
  int32 count = 4;
  string raw_snbt = 5;
  reserved 6, 7;
  reserved "model_json", "textures";
  repeated PlayerItemDetail details = 8; // parsed display/lore/enchant/durability metadata
  bytes raw_nbt = 9; // original named binary NBT; preferred over lossy SNBT text
  repeated PlayerItemAsset render_assets = 10; // raw item/model JSON and PNG resources; interpreted by WinUI
}

message PlayerItemAsset {
  string path = 1; // normalized assets/<namespace>/(items|models|textures)/... path
  bytes data = 2;
}

message PlayerItemDetail {
  string label = 1;
  string value = 2;
}

message PlayerData {
  string server_id = 1;
  string name = 2;
  string uuid = 3;
  string raw_snbt = 4;
  repeated PlayerInventoryItem inventory = 5;
  repeated PlayerInventoryItem ender_chest = 6;
  bytes raw_nbt = 7; // original named binary NBT for reliable client-side parsing
}

enum BanListType {
  BAN_LIST_TYPE_UNSPECIFIED = 0;
  PLAYER_BANS = 1;
  IP_BANS = 2;
}

message BanEntry {
  BanListType type = 1;
  string target = 2;
  string name = 3;
  string uuid = 4;
  string created = 5;
  string source = 6;
  string expires = 7;
  string reason = 8;
}

message BanList {
  string server_id = 1;
  repeated BanEntry entries = 2;
}

message AddBanRequest {
  string server_id = 1;
  BanListType type = 2;
  string target = 3;
  string reason = 4;
}

message RemoveBanRequest {
  string server_id = 1;
  BanListType type = 2;
  string target = 3;
}

// -- Metrics: per-server resource samples (~1 Hz) ------------------------------

message ResourceSample {
  string server_id = 1;
  double cpu_percent = 2; // normalized 0..100 across all cores
  int64 memory_bytes = 3; // current working set
  int64 memory_limit_bytes = 4; // configured cap; 0 = uncapped
  int64 net_rx_bytes_per_sec = 5; // 0 when network_available = false
  int64 net_tx_bytes_per_sec = 6;
  bool network_available = 7; // false on the on-machine backend (Windows per-process net is impractical)
  reserved 8;
}

// -- Server config: server.properties + world gamerules -----------------------

enum ConfigValueType {
  CONFIG_VALUE_TYPE_UNSPECIFIED = 0;
  CONFIG_STRING = 1;
  CONFIG_INTEGER = 2;
  CONFIG_BOOLEAN = 3;
  CONFIG_ENUM = 4;
}

message ConfigEntry {
  string key = 1;
  string value = 2;
  ConfigValueType type = 3;
  repeated string choices = 4;
  string description = 5;
  bool supported = 6;
  string since_version = 7;
}

message ServerProperties {
  string server_id = 1;
  repeated ConfigEntry entries = 2;
}

message GameRules {
  string server_id = 1;
  repeated ConfigEntry entries = 2;
  bool world_exists = 3;
  string message = 4;
}

message ConfigUpdate {
  string key = 1;
  string value = 2;
}

message UpdateServerPropertiesRequest {
  string server_id = 1;
  repeated ConfigUpdate entries = 2;
}

message UpdateGameRulesRequest {
  string server_id = 1;
  repeated ConfigUpdate entries = 2;
}

// -- Plugins/Mods: jar files in the server's plugins|mods folder ---------------

enum ModKind {
  MOD_KIND_UNSPECIFIED = 0;
  PLUGIN = 1; // Paper/Spigot -> plugins/
  MOD = 2; // Forge/NeoForge/Fabric -> mods/
}
// ModMetadata is what a parser script extracted from a jar's embedded
// descriptor (fabric.mod.json / mods.toml / plugin.yml / ...). parsed=false
// means no installed parser recognized the jar (UI falls back to the filename).
message ModMetadata {
  bool parsed = 1;              // a parser matched this jar
  string parser_id = 2;         // which parser produced it
  string loader = 3;            // "fabric"|"quilt"|"forge"|"neoforge"|"forge-legacy"|"liteloader"|"bukkit"|"paper"
  string mod_id = 4;
  string name = 5;
  string version = 6;
  repeated string authors = 7;
  string description = 8;
  string website = 9;
  bytes icon = 10;              // raw image bytes (png/jpg), optional
}

message ModFile {
  string name = 1;
  int64 size_bytes = 2;
  ModMetadata metadata = 3;
}
message ModList {
  string server_id = 1;
  ModKind kind = 2;
  repeated ModFile files = 3;
  bool supported = 4; // false for Vanilla (no plugins/mods folder)
}
message UploadModInit {
  string server_id = 1;
  string filename = 2;
} // first Upload message
message UploadModRequest {
  oneof payload {
    UploadModInit init = 1;
    bytes chunk = 2;
  }
}
message RemoveModRequest {
  string server_id = 1;
  string name = 2;
}

// -- Services -----------------------------------------------------------------

service EngineService {
  rpc Health(Empty) returns (Empty);
  rpc ListVersions(VersionQuery) returns (VersionList); // available MC versions per type
}

service ServerService {
  rpc List(Empty) returns (ServerList);
  rpc Create(CreateServerRequest) returns (stream InstallProgress); // last message implies done
  rpc Update(UpdateServerRequest) returns (Server);
  rpc Start(ServerId) returns (Empty);
  rpc Stop(ServerId) returns (Empty);
  rpc Delete(ServerId) returns (Empty);
  rpc RemoveAllData(Empty) returns (Empty); // stop everything and wipe all on-disk data (PROMPT 禮8)
}

service ConsoleService {
  rpc Attach(stream ConsoleInput) returns (stream ConsoleEvent);
}

service BackupService {
  rpc Create(CreateBackupRequest) returns (Backup);
  rpc List(ServerId) returns (BackupList);
  rpc Restore(RestoreBackupRequest) returns (Empty);
  rpc Delete(Backup) returns (Empty);
}

service SettingsService {
  rpc GetLogRetention(Empty) returns (LogRetention);
  rpc SetLogRetention(LogRetention) returns (Empty);
  rpc PurgeLogs(Empty) returns (PurgeResult); // apply the policy immediately
  rpc GetBackendInfo(Empty) returns (BackendInfo);
  rpc SetUseDocker(UseDocker) returns (Empty); // opt in/out; takes effect on next launch
}

service PlayerService {
  rpc Watch(ServerId) returns (stream PlayerList); // streams the online roster on change
  rpc GetData(PlayerLookup) returns (PlayerData);
  rpc ListBans(ServerId) returns (BanList);
  rpc AddBan(AddBanRequest) returns (BanEntry);
  rpc RemoveBan(RemoveBanRequest) returns (Empty);
}

service MetricsService {
  rpc Watch(ServerId) returns (stream ResourceSample); // ~1 Hz resource samples while running
}

service ModService {
  rpc List(ServerId) returns (ModList);
  rpc Upload(stream UploadModRequest) returns (ModFile); // first message = init, then raw chunks
  rpc Remove(RemoveModRequest) returns (Empty);
}

service ConfigService {
  rpc GetServerProperties(ServerId) returns (ServerProperties);
  rpc UpdateServerProperties(UpdateServerPropertiesRequest) returns (ServerProperties);
  rpc GetGameRules(ServerId) returns (GameRules);
  rpc UpdateGameRules(UpdateGameRulesRequest) returns (GameRules);
}

// ProviderService manages the Lua provider scripts that define how server types
// are downloaded/installed (built-in + user-imported) and their permissions.
service ProviderService {
  rpc List(Empty) returns (ProviderList);
  rpc Import(ImportProviderRequest) returns (ProviderInfo); // import a user .lua (+ optional jar)
  rpc Remove(ProviderRef) returns (Empty);
  rpc SetPermissions(SetPermissionsRequest) returns (ProviderInfo);
}

// ParserService manages the Lua parser scripts that extract mod/plugin
// metadata (name, version, authors, icon, ...) from uploaded jars.
service ParserService {
  rpc List(Empty) returns (ParserList);
  rpc Import(ImportParserRequest) returns (ParserInfo);
  rpc Remove(ProviderRef) returns (Empty);
  rpc SetPermissions(SetPermissionsRequest) returns (ParserInfo);
}

// ScriptService manages automation/control scripts that drive running servers
// (read logs, send commands, start/stop) on events or a schedule.
service ScriptService {
  rpc List(Empty) returns (ScriptList);
  rpc Import(ImportScriptRequest) returns (ScriptInfo);
  rpc SetEnabled(SetScriptEnabledRequest) returns (ScriptInfo);
  rpc SetPermissions(SetPermissionsRequest) returns (ScriptInfo);
  rpc Remove(ProviderRef) returns (Empty);
  rpc StreamLog(Empty) returns (stream ScriptLogLine); // engine-wide automation log
}
