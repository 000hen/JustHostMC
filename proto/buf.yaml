version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  except:
    # The contract in PROMPT §4 uses bare enum value names (VANILLA, PAPER, …)
    # and a zero value that is not <ENUM>_UNSPECIFIED-prefixed per Google style.
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    - PACKAGE_VERSION_SUFFIX
breaking:
  use:
    - FILE
