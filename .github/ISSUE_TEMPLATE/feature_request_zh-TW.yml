name: 功能建議（正體中文）
description: 建議 JustHostMC 的新功能或改善項目
title: "[功能]: "
labels:
  - "feature / 功能請求"
body:
  - type: textarea
    id: problem
    attributes:
      label: 問題或使用情境
      description: 您想完成什麼？目前有哪些困難？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建議方案
      description: 請描述您希望新增的行為或使用體驗。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考慮過的替代方案
      description: 請分享您試過的因應方式或考慮過的其他方法。

  - type: textarea
    id: context
    attributes:
      label: 其他資訊
      description: 可加入示意圖、範例或相關連結，協助說明這項建議。

  - type: checkboxes
    id: checks
    attributes:
      label: 送出前確認
      options:
        - label: 我已搜尋現有 issue，確認沒有類似的功能建議。
          required: true

