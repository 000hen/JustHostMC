name: Build release assets

on:
  # Create and publish the GitHub Release first. This workflow only uploads
  # assets to that existing release; it never creates a release.
  release:
    types: [published]

  # Manual fallback for rebuilding or replacing assets on an existing release.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (for example: v1.2.3.4)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-assets-${{ github.event.release.id || inputs.tag }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"

jobs:
  prepare:
    name: Validate existing release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      app_version: ${{ steps.version.outputs.app_version }}
      msi_version: ${{ steps.version.outputs.msi_version }}

    steps:
      - name: Resolve and validate version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "release" ]]; then
            tag="$RELEASE_TAG"
          else
            tag="$INPUT_TAG"
          fi

          # WinUI/.NET file versions use four numeric components.
          if [[ ! "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Release tag must use vMAJOR.MINOR.BUILD.REVISION, for example v1.2.3.4."
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          build="${BASH_REMATCH[3]}"
          revision="${BASH_REMATCH[4]}"

          # Each Windows/.NET four-part version component must fit UInt16.
          for part in "$major" "$minor" "$build" "$revision"; do
            if (( 10#$part > 65535 )); then
              echo "::error::Version component '$part' exceeds 65535."
              exit 1
            fi
          done

          # Windows Installer ProductVersion supports only major.minor.build.
          if (( 10#$major > 255 || 10#$minor > 255 || 10#$build > 65535 )); then
            echo "::error::MSI version limits are major <= 255, minor <= 255, build <= 65535."
            exit 1
          fi

          app_version="$major.$minor.$build.$revision"
          msi_version="$major.$minor.$build"

          # Refuse to create a release implicitly. The target release must exist.
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "msi_version=$msi_version" >> "$GITHUB_OUTPUT"

          echo "Release tag: $tag"
          echo "Application version: $app_version"
          echo "MSI ProductVersion: $msi_version"

  build:
    name: Build ${{ matrix.arch }}
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            rid: win-x64
            app_platform: x64
            wix_platform: x64
            goarch: amd64
          - arch: x86
            rid: win-x86
            app_platform: x86
            wix_platform: x86
            goarch: "386"
          - arch: arm64
            rid: win-arm64
            app_platform: ARM64
            wix_platform: arm64
            goarch: arm64

    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
      MSI_VERSION: ${{ needs.prepare.outputs.msi_version }}
      JHMC_CURSEFORGE_API_KEY: ${{ secrets.JHMC_CURSEFORGE_API_KEY }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.sum

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install protobuf generators
        shell: pwsh
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2

      - name: Generate protobuf code
        shell: pwsh
        working-directory: proto
        run: buf generate

      - name: Build Go engine
        shell: pwsh
        working-directory: engine
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: |
          New-Item -ItemType Directory -Force ../build | Out-Null

          $ldflags = "-s -w -buildid="
          if ($env:JHMC_CURSEFORGE_API_KEY) {
            $ldflags += " -X main.defaultCurseForgeKey=$($env:JHMC_CURSEFORGE_API_KEY)"
          }

          go build -trimpath -buildvcs=false -mod=readonly `
            -ldflags="$ldflags" `
            -o ../build/engine.exe ./cmd/engine

          if (-not (Test-Path ../build/engine.exe)) {
            throw "build/engine.exe was not produced."
          }

      - name: Stamp Windows manifest version
        shell: pwsh
        run: |
          $path = "app/JustHostMC.App/app.manifest"
          $content = [System.IO.File]::ReadAllText($path)
          $pattern = '(<assemblyIdentity\s+version=")[^"]+("\s+name="JustHostMC\.App")'
          $replacement = '${1}' + $env:APP_VERSION + '${2}'
          $updated = ([regex]::new($pattern)).Replace($content, $replacement, 1)

          if ($updated -eq $content) {
            throw "Could not update assemblyIdentity in $path."
          }

          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::WriteAllText($path, $updated, $utf8NoBom)

      - name: Publish portable executable
        shell: pwsh
        run: |
          dotnet publish app/JustHostMC.App/JustHostMC.App.csproj `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            --output artifacts/portable `
            -p:Platform=${{ matrix.app_platform }} `
            -p:DistributionChannel=GitHubPortable `
            -p:WindowsPackageType=None `
            -p:EnableMsixTooling=false `
            -p:WindowsAppSDKSelfContained=true `
            -p:PublishSingleFile=true `
            -p:IncludeAllContentForSelfExtract=true `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -p:Version="$env:APP_VERSION" `
            -p:AssemblyVersion="$env:APP_VERSION" `
            -p:FileVersion="$env:APP_VERSION" `
            -p:InformationalVersion="$env:APP_VERSION" `
            -p:IncludeSourceRevisionInInformationalVersion=false `
            -p:ContinuousIntegrationBuild=true `
            -p:SkipEngineBuild=true `
            -p:SkipProtobufGenerate=true

      - name: Verify portable executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem artifacts/portable `
            -Filter "JustHostMC.App.exe" `
            -File `
            -Recurse | Select-Object -First 1

          if (-not $exe) {
            throw "Portable JustHostMC.App.exe was not produced."
          }

          Write-Host "Portable executable: $($exe.FullName)"
          Write-Host "Size: $($exe.Length) bytes"

      - name: Publish MSI payload
        shell: pwsh
        run: |
          dotnet publish app/JustHostMC.App/JustHostMC.App.csproj `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            --output artifacts/msi-payload `
            -p:Platform=${{ matrix.app_platform }} `
            -p:DistributionChannel=GitHubMsi `
            -p:WindowsPackageType=None `
            -p:EnableMsixTooling=false `
            -p:WindowsAppSDKSelfContained=true `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -p:Version="$env:APP_VERSION" `
            -p:AssemblyVersion="$env:APP_VERSION" `
            -p:FileVersion="$env:APP_VERSION" `
            -p:InformationalVersion="$env:APP_VERSION" `
            -p:IncludeSourceRevisionInInformationalVersion=false `
            -p:ContinuousIntegrationBuild=true `
            -p:SkipEngineBuild=true `
            -p:SkipProtobufGenerate=true

      - name: Verify MSI payload
        shell: pwsh
        run: |
          if (-not (Test-Path artifacts/msi-payload/JustHostMC.App.exe)) {
            throw "JustHostMC.App.exe is missing from the MSI payload."
          }

          $engine = Get-ChildItem artifacts/msi-payload `
            -Filter "engine.exe" `
            -File `
            -Recurse | Select-Object -First 1

          if (-not $engine) {
            throw "engine.exe is missing from the MSI payload."
          }

      - name: Build MSI installer
        shell: pwsh
        run: |
          $payloadDir = (Resolve-Path artifacts/msi-payload).Path
          $outputDir = Join-Path $PWD "artifacts/msi"
          New-Item -ItemType Directory -Force $outputDir | Out-Null

          dotnet build installer/JustHostMC.Installer/JustHostMC.Installer.wixproj `
            --configuration Release `
            --output "$outputDir" `
            -p:Platform=${{ matrix.wix_platform }} `
            -p:InstallerPlatform=${{ matrix.wix_platform }} `
            -p:ProductVersion="$env:MSI_VERSION" `
            -p:PublishDir="$payloadDir" `
            -p:ContinuousIntegrationBuild=true

      - name: Stage release assets
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $version = $env:APP_VERSION
          $releaseDir = "release"
          New-Item -ItemType Directory -Force $releaseDir | Out-Null

          $portableExe = Get-ChildItem artifacts/portable `
            -Filter "JustHostMC.App.exe" `
            -File `
            -Recurse | Select-Object -First 1

          $msi = Get-ChildItem artifacts/msi `
            -Filter "*.msi" `
            -File `
            -Recurse | Select-Object -First 1

          if (-not $portableExe) {
            throw "Portable executable is missing."
          }
          if (-not $msi) {
            throw "MSI installer is missing."
          }

          Copy-Item `
            $portableExe.FullName `
            "$releaseDir/JustHostMC-$version-windows-$arch-portable.exe"

          Copy-Item `
            $msi.FullName `
            "$releaseDir/JustHostMC-$version-windows-$arch.msi"

          $checksumLines = foreach ($file in Get-ChildItem $releaseDir -File) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }

          $checksumPath = "$releaseDir/SHA256SUMS-$arch.txt"
          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::WriteAllLines($checksumPath, $checksumLines, $utf8NoBom)

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: release/
          if-no-files-found: error
          retention-days: 7

  attach:
    name: Attach assets to existing release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Merge checksums
        shell: bash
        run: |
          set -euo pipefail
          cat artifacts/SHA256SUMS-*.txt | LC_ALL=C sort > artifacts/SHA256SUMS.txt
          rm artifacts/SHA256SUMS-*.txt

      - name: Verify existing release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          gh release upload "$RELEASE_TAG" \
            artifacts/*.exe \
            artifacts/*.msi \
            artifacts/SHA256SUMS.txt \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
